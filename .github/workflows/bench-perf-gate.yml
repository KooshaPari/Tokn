name: Bench and Perf Gate

on:
  pull_request:
    paths:
      - "tokenledger/src/**"
      - "tokenledger/benchmarks/**"
      - "tokenledger/scripts/perf_gate.sh"
      - "tokenledger/Cargo.toml"
      - "tokenledger/Cargo.lock"
      - "tokenledger/examples/**"
      - "tokenledger/pricing.example.json"
  push:
    branches:
      - main
    paths:
      - "tokenledger/src/**"
      - "tokenledger/benchmarks/**"
      - "tokenledger/scripts/perf_gate.sh"
      - "tokenledger/Cargo.toml"
      - "tokenledger/Cargo.lock"
      - "tokenledger/examples/**"
      - "tokenledger/pricing.example.json"
jobs:
  bench-perf-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tokenledger
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@874b06e0d3f63371f9ddbee43d4c8ebc73021583 # v-latest

      - name: Run benchmark scenarios
        run: cargo run --quiet -- bench --scenario all --events ./examples/events.jsonl --pricing ./pricing.example.json --json-output > /tmp/tokenledger-bench.json

      - name: Verify benchmark golden baseline lock
        run: cargo run --quiet -- bench --scenario all --events ./examples/events.jsonl --pricing ./pricing.example.json --golden ./benchmarks/fixtures/bench-golden.json --golden-epsilon 0.0001 --json-output > /tmp/tokenledger-bench-golden-check.json

      - name: Run strict perf gate (cold-backfill + warm-tail + burst)
        run: PERF_STRICT=1 PERF_BASELINE=./benchmarks/results/latest-summary.json ./scripts/perf_gate.sh
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


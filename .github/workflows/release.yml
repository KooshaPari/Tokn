name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


permissions:
  contents: write
  packages: write
jobs:
  release:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'release:') || contains(github.event.head_commit.message, 'chore(release)')
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release

      - name: Determine version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to crates.io
        run: |
          cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      

  promote:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Promote to staging
        uses: KooshaPari/phenotypeActions/promote@0000000000000000000000000000000000000000 # placeholder SHA; source 404s; no live equivalent (audit 2026-06-05 found no matching file in 15 live org repos; prior candidate KooshaPari/phenotypeActions/promote@0000000000000000000000000000000000000000 # placeholder SHA; source 404s; FORK from PhenoDevOps/.github/workflows/promote.yml@edbdfad00abfe2f691b553cce00f0fd9e3485d72)
        with:
          version: ${{ needs.release.outputs.version }}
          channel: beta
          registry: crates.io

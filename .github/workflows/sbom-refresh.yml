name: Monthly SBOM Refresh
on:
  schedule:
    - cron: '0 0 1 * *'  # 1st of each month
  workflow_dispatch:
permissions:
  contents: read


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call-sbom-refresh:
    timeout-minutes: 30
    uses: KooshaPari/phenotype-tooling/.github/workflows/sbom-monthly.yml@main
    with:
      repo_path: '.'
      build_system: 'rust'

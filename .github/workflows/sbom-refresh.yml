name: Monthly SBOM Refresh
on:
  schedule:
    - cron: '0 0 1 * *'  # 1st of each month
  workflow_dispatch:
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call-sbom-refresh:
    uses: KooshaPari/phenotype-tooling/.github/workflows/sbom-monthly.yml@604fcb5352a8fb68fdd52a9503fefea1163dc2ea
    with:
      repo_path: '.'
      build_system: 'rust'

name: Security (SAST)
on:
  push:
    branches: [main, develop]
  pull_request:
  schedule: [{cron: "0 2 * * *"}]
jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4- uses: github/codeql-action/init-action@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3with:
          languages: [typescript, python, rust, go]
      - uses: github/codeql-action/autobuild@19b3a84f58f551a99396341585444cb37be03324  # was: no ref (default branch)
      - uses: github/codeql-action/analyze@19b3a84f58f551a99396341585444cb37be03324  # was: no ref (default branch)
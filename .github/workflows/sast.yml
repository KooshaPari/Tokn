name: Security (SAST)
on:
  push:
    branches: [main, develop]
  pull_request:
  schedule: [{cron: "0 2 * * *"}]
  security-events: write
jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: github/codeql-action/init@v4
        with:
          languages: rust

      - uses: github/codeql-action/analyze@v4
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


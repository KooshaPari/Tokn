name: Security (SAST)
on:
  push:
    branches: [main, develop]
  pull_request:
  schedule: [{cron: "0 2 * * *"}]
permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: github/codeql-action/init@v4
        with:
          languages: rust

      - uses: github/codeql-action/analyze@v4

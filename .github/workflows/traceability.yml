name: FR Traceability

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  traceability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48 # v-latest
        with:
          python-version: "3.11"

      - name: Check FR Coverage
        run: |
          test -d FRs
          test -f docs/worklogs/WORK_LOG.md
          test -f docs/worklogs/README.md

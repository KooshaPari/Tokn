name: FR Traceability

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
permissions:
  contents: read


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  traceability:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Check FR Coverage
        run: |
          test -d FRs
          test -f docs/worklogs/WORK_LOG.md
          test -f docs/worklogs/README.md

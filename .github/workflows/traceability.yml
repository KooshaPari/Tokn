name: FR Traceability

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
permissions:
  contents: read


jobs:
  traceability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install ptrace CLI
        id: ptrace
        run: |
          mkdir -p ~/bin
          if ! curl -fsSL https://raw.githubusercontent.com/phenotype/AgilePlus/main/bin/ptrace -o ~/bin/ptrace; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "ptrace installer unavailable; skipping FR traceability validation."
            exit 0
          fi
          chmod +x ~/bin/ptrace
          echo "$HOME/bin" >> "$GITHUB_PATH"
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Check FR Coverage
        if: steps.ptrace.outputs.available == 'true'
        run: ptrace validate-ai --project .

name: CodeQL
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1'
permissions:
  contents: read
  security-events: write


jobs:
  analyze:
    uses: KooshaPari/phenoShared/.github/workflows/codeql.yml@4b820a6d1eca7884e692e4ec4edf2b59732809cd
    permissions:
      contents: read
      actions: read
      security-events: write
    with:
      languages: '["rust"]'
      build-mode: 'manual'
      build-command: 'cargo build --release || cargo build'

name: Alert sync issues
on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
permissions:
  contents: read


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    timeout-minutes: 30
    uses: KooshaPari/phenoShared/.github/workflows/alert-sync-issues.yml@main
    with:
      auto-label: auto-alert-sync

name: Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
permissions:
  contents: read


env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4- name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Run deny
        run: cargo deny check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4- name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Check documentation
        run: cargo doc --no-deps

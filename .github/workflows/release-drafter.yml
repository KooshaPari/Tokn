name: Release Drafter

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-drafter:
    timeout-minutes: 30
    uses: KooshaPari/phenoShared/.github/workflows/reusable-release-drafter.yml@main
    permissions:
      contents: write
      pull-requests: write

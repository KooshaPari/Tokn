name: release-crates
on:
  push:
    tags: ['v*']
  pull_request:
    paths: ['crates/**', '.github/workflows/release-crates.yml']
permissions:
  contents: read
jobs:
  dry-run:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Soft-fail is publish-only: KooshaPari GH Actions billing is empty, so
      # dry-runs often fail without usable registry/network on billed runners.
      # Binary/asset jobs in binaries.yml must still fail hard on missing files.
      - name: Dry-run publish (pareto-rs)
        run: cargo publish --dry-run -p pareto-rs || true
      - name: Dry-run publish (tokenledger-rs)
        run: cargo publish --dry-run -p tokenledger-rs || true
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Require CARGO_REGISTRY_TOKEN
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN secret is not set; refusing silent crates.io skip"
            exit 1
          fi
      - name: Publish (pareto-rs first, then tokenledger)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # Soft-fail only when crates.io already has this exact version
          # (idempotent re-tag). Any other publish failure must fail the job.
          publish_or_skip_existing() {
            local pkg="$1"
            local out
            set +e
            out=$(cargo publish -p "$pkg" --token "$CARGO_REGISTRY_TOKEN" 2>&1)
            local rc=$?
            set -e
            echo "$out"
            if [ "$rc" -eq 0 ]; then
              return 0
            fi
            if echo "$out" | grep -qiE 'already exists|already uploaded'; then
              echo "::notice::$pkg already published at this version; continuing"
              return 0
            fi
            echo "::error::$pkg publish failed (rc=$rc)"
            return "$rc"
          }
          publish_or_skip_existing pareto-rs
          sleep 30
          publish_or_skip_existing tokenledger-rs

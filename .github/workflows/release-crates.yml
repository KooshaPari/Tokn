name: Release Crates

on:
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish -p tokenledger-rs --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  dry-run:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Validate crates.io publish
        run: cargo publish --dry-run -p tokenledger-rs

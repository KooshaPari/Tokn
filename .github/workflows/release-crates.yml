name: Release Crates

on:
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Publish pareto-rs to crates.io
        run: cargo publish -p pareto-rs --token "${{ secrets.CARGO_REGISTRY_TOKEN }}" || echo "pareto-rs publish skipped (may exist)"

      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish tokenledger-rs to crates.io
        run: cargo publish -p tokenledger-rs --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  dry-run:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Validate pareto-rs publish
        run: cargo publish --dry-run -p pareto-rs

      - name: Validate tokenledger-rs publish
        run: cargo publish --dry-run -p tokenledger-rs

[advisories]
db-path = "$CARGO_HOME/advisory-db"

[licenses]
# Unicode-3.0 is OSI-approved + commonly accepted in Rust ecosystem
# Required for icu_collections/icu_locale_core transitive chain via reqwest→url→idna (W-79 audit)
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "CC0-1.0",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
